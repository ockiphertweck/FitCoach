name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Biome)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          # Dummy values satisfy env validation at module load time.
          # Unit tests never connect to a real database or external service.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DB_PASSWORD: ci-password
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          API_KEY_ENCRYPTION_KEY: ci-encryption-key-at-least-32-chars!
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: ci-strava-secret
          STRAVA_REDIRECT_URI: http://localhost:3000/strava/callback
