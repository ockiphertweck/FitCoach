name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Biome)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        env:
          # Dummy values satisfy env validation at module load time.
          # Unit tests never connect to a real database or external service.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DB_PASSWORD: ci-password
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-long
          API_KEY_ENCRYPTION_KEY: ci-encryption-key-at-least-32-chars!
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: ci-strava-secret
          STRAVA_REDIRECT_URI: http://localhost:3000/strava/callback
